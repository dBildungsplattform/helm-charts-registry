global:
  imageRegistry: ""
  #imagePullSecrets: [""]
  ## ldapDomain , can be explicit (e.g dc=example,c=com) or domain based (e.g example.com)
  ldapDomain: "training.ucs"                  # translates to LDAP_ROOT
  # Specifies an existing secret to be used for admin and config user passwords. The expected key are LDAP_ADMIN_PASSWORD and LDAP_CONFIG_ADMIN_PASSWORD.
  existingSecret: ""
  # If you do not set the credentials via this secret but via the ENV the Helm Chart will fail (permission issue)
  adminUser: "admin"                          # LDAP_ADMIN_USERNAME
  # adminPassword: ""                         # LDAP_CONFIG_ADMIN_PASSWORD
  configUserEnabled: true                     # LDAP_CONFIG_ADMIN_ENABLED (default: no)
  configUser: "config"                        # LDAP_CONFIG_ADMIN_USERNAME
  # configPassword: ""                        # LDAP_CONFIG_ADMIN_USERNAME
  ldapPort: 389                               # LDAP_PORT_NUMBER
  sslLdapPort: 636                            # LDAP_LDAPS_PORT_NUMBER

nameOverride: ""
fullnameOverride: ""


# this is not so clean -can this get deleted? 
# used extra secret var since you can not reference the global one
existingSecret:
  enabled: true
  name: erwin-portal-ldap

image:
  repository: bitnamilegacy/openldap
  tag: 2.6.6
  pullPolicy: Always
  pullSecrets: []

extraLabels: {}

service:
  annotations: {}
  ## If service type NodePort, define the value here
  # ldapPortNodePort:
  # sslLdapPortNodePort:

  enableLdapPort: true
  enableSslLdapPort: true

  sessionAffinity: None
  type: ClusterIP 
  # type: LoadBalancer
  externalIp: false
  # if enabled you need to have to set the LOADBALANCER_IP key with value in the existingSecret
  # externalIp: true
  SourceRangesRestriction: false
  # if enabled you need to have to set the LOADBALANCER_SOURCERANGES key with value in the existingSecret
  # servicecenter für den prometheus blackbox exporter freischalten
  # SourceRangesRestriction: true
  # enableLdapPort: false

# enable this service block and disable the service one above, to make LDAP outside the cluster available 	
# Note that only one namespace at a time can use this feature!!	
# service:	
#   enableLdapPort: true
#   enableSslLdapPort: true	
#   type: LoadBalancer	
#   externalIp: true	
#   SourceRangesRestriction: false


# Use the env variables from https://hub.docker.com/r/bitnami/openldap/
env:
  BITNAMI_DEBUG: "true"
  LDAP_LOGLEVEL: "256"
  # LDAP_LOGLEVEL: "16384"

  # Configuration
  LDAP_SKIP_DEFAULT_TREE: "yes"
  LDAP_ULIMIT_NOFILES: "1024" # staging and prod: 4096
  # if something is not needed it can get removed by just not mentioning it here # order is importand, do not put nis in front, always append it
  # is this is enabled replication is not working
  LDAP_EXTRA_SCHEMAS: cosine,inetorgperson,nis,ucsschool

  # Security
  LDAP_ENABLE_TLS: "yes" 
  # LDAP_ENABLE_TLS: "no" # disable it for testing with phpldapadmin
  # LDAP_REQUIRE_TLS: "yes" # not sure whether this is necessary, it breaks stuff
  LDAPTLS_REQCERT: "never"
  LDAP_TLS_ENFORCE: "false"
  LDAP_ALLOW_ANON_BINDING: "no" 

  # Accesslog
  LDAP_ENABLE_ACCESSLOG: "yes" 
  LDAP_ACCESSLOG_LOGPURGE: "30+00:00 30+00:00" # min and max value

pdb:
  enabled: false
  minAvailable: 1
  maxUnavailable: ""

# Custom openldap schema files used to be used in addition to default schemas
# Note that the supplied files are sorted by name and inserted into 'LDAP_EXTRA_SCHEMAS' env var
# after chart default schemas, allowing you to control the loading sequence.
customSchemaFiles:
  02-univention-base.ldif: |-
    dn: cn=univentionBase,cn=schema,cn=config
    objectClass: olcSchemaConfig
    cn: univentionBase
    olcAttributeTypes: ( 1.3.6.1.4.1.10176.1000.1.1 NAME 'univentionObjectIdentifier' DESC 'unique identifier' EQUALITY caseIgnoreMatch SYNTAX 1.3.6.1.4.1.1466.115.121.1.15 SINGLE-VALUE )
    olcAttributeTypes: ( 1.3.6.1.4.1.10176.1000.1.2 NAME 'univentionPolicyReference' DESC 'Reference to a policy' EQUALITY distinguishedNameMatch SYNTAX 1.3.6.1.4.1.1466.115.121.1.12 )
    olcObjectClasses: ( 1.3.6.1.4.1.10176.1000.2.1 NAME 'univentionObject' DESC 'Univention Object' SUP top AUXILIARY MAY ( univentionObjectIdentifier ) )
    olcObjectClasses: ( 1.3.6.1.4.1.10176.1000.2.2 NAME 'univentionPWHistory' DESC 'Univention Password History' SUP top AUXILIARY )
    olcObjectClasses: ( 1.3.6.1.4.1.10176.1000.2.3 NAME 'univentionPerson' DESC 'Univention Person' SUP top AUXILIARY )
    olcObjectClasses: ( 1.3.6.1.4.1.10176.1000.2.4 NAME 'univentionPolicyReference' DESC 'Univention Policy Reference' SUP top AUXILIARY MAY ( univentionPolicyReference ) )

  03-samba.ldif: |-
    dn: cn=samba,cn=schema,cn=config
    objectClass: olcSchemaConfig
    cn: samba
    olcAttributeTypes: ( 1.3.6.1.4.1.7165.2.1.24 NAME 'sambaSID' DESC 'Security ID' EQUALITY caseIgnoreIA5Match SUBSTR caseIgnoreSubstringsMatch SYNTAX 1.3.6.1.4.1.1466.115.121.1.26{64} SINGLE-VALUE )
    olcObjectClasses: ( 1.3.6.1.4.1.7165.2.2.6 NAME 'sambaSamAccount' DESC 'Samba Sam Account' SUP top AUXILIARY MAY ( sambaSID ) )

  03a-krb5.ldif: |-
    dn: cn=krb5,cn=schema,cn=config
    objectClass: olcSchemaConfig
    cn: krb5
    olcAttributeTypes: ( 1.3.6.1.4.1.5322.10.1.1 NAME 'krb5PrincipalName' DESC 'Kerberos principal name' EQUALITY caseExactIA5Match SYNTAX 1.3.6.1.4.1.1466.115.121.1.26 SINGLE-VALUE )
    olcAttributeTypes: ( 1.3.6.1.4.1.5322.10.1.2 NAME 'krb5KeyVersionNumber' DESC 'Kerberos key version number' EQUALITY integerMatch SYNTAX 1.3.6.1.4.1.1466.115.121.1.27 SINGLE-VALUE )
    olcObjectClasses: ( 1.3.6.1.4.1.5322.10.2.1 NAME 'krb5Principal' DESC 'Kerberos Principal' SUP top AUXILIARY MAY ( krb5PrincipalName ) )
    olcObjectClasses: ( 1.3.6.1.4.1.5322.10.2.2 NAME 'krb5KDCEntry' DESC 'Kerberos KDC Entry' SUP krb5Principal AUXILIARY MAY ( krb5KeyVersionNumber ) )

  03b-automount.ldif: |-
    dn: cn=automount,cn=schema,cn=config
    objectClass: olcSchemaConfig
    cn: automount
    olcAttributeTypes: ( 1.3.6.1.1.1.1.33 NAME 'automountInformation' DESC 'Automount information' EQUALITY caseExactIA5Match SUBSTR caseExactIA5SubstringsMatch SYNTAX 1.3.6.1.4.1.1466.115.121.1.26 SINGLE-VALUE )
    olcObjectClasses: ( 1.3.6.1.1.1.2.13 NAME 'automount' DESC 'Automount entry' SUP top AUXILIARY MAY ( automountInformation ) )

  04-customerdb.ldif: |-
    dn: cn=customerDb,cn=schema,cn=config
    objectClass: olcSchemaConfig
    cn: customerDb
    olcAttributeTypes: ( 1.3.6.1.4.1.10176.5000.1.1 NAME 'customerDbId' DESC 'Customer Database ID' EQUALITY caseIgnoreMatch SYNTAX 1.3.6.1.4.1.1466.115.121.1.15 )
    olcObjectClasses: ( 1.3.6.1.4.1.10176.5000.2.1 NAME 'customerDbIds' DESC 'Customer Database IDs' SUP top AUXILIARY MAY ( customerDbId ) )

  05-oxuser.ldif: |-
    dn: cn=oxUser,cn=schema,cn=config
    objectClass: olcSchemaConfig
    cn: oxUser
    olcObjectClasses: ( 1.3.6.1.4.1.48710.1.4.101 NAME 'oxUserObject' DESC 'Gluu User Object' SUP top AUXILIARY )

  06-ucsmail.ldif: |-
    dn: cn=ucsMail,cn=schema,cn=config
    objectClass: olcSchemaConfig
    cn: ucsMail
    olcAttributeTypes: ( 1.3.6.1.4.1.10176.1010.1.1 NAME 'mailPrimaryAddress' DESC 'Primary mailaddresses for the user' EQUALITY caseIgnoreIA5Match SUBSTR caseIgnoreSubstringsMatch SYNTAX 1.3.6.1.4.1.1466.115.121.1.26 SINGLE-VALUE )
    olcAttributeTypes: ( 1.3.6.1.4.1.10176.1010.1.2 NAME 'mailAlternativeAddress' DESC 'Secondary (alias) mailaddresses for the same user' EQUALITY caseIgnoreIA5Match SUBSTR caseIgnoreSubstringsMatch SYNTAX 1.3.6.1.4.1.1466.115.121.1.26 )
    olcAttributeTypes: ( 1.3.6.1.4.1.10176.1010.1.3 NAME 'mailGlobalSpamFolder'DESC 'Move Spam to global spam folder instead of local spam folder' EQUALITY caseIgnoreIA5Match SYNTAX 1.3.6.1.4.1.1466.115.121.1.26 )
    olcAttributeTypes: ( 1.3.6.1.4.1.10176.1010.1.47 NAME 'mailForwardAddress'DESC 'External mail addresses to forward the users emails to' EQUALITY caseIgnoreMatch SUBSTR caseIgnoreSubstringsMatch SYNTAX 1.3.6.1.4.1.1466.115.121.1.15 )
    olcAttributeTypes: ( 1.3.6.1.4.1.10176.1010.1.51 NAME 'mailForwardCopyToSelf' EQUALITY caseIgnoreMatch SUBSTR caseIgnoreSubstringsMatch SYNTAX 1.3.6.1.4.1.1466.115.121.1.15{10} SINGLE-VALUE )
    olcAttributeTypes: ( 1.3.6.1.4.1.10176.1010.1.60 NAME 'univentionMailHomeServer' DESC 'home server of users mailbox' EQUALITY caseIgnoreMatch SUBSTR caseIgnoreSubstringsMatch SYNTAX 1.3.6.1.4.1.1466.115.121.1.15{256} SINGLE-VALUE )
    olcAttributeTypes: ( 1.3.6.1.4.1.10176.1010.1.92 NAME 'univentionMailUserQuota' DESC 'Mailbox hard quota limit in MB' EQUALITY caseIgnoreMatch SUBSTR caseIgnoreSubstringsMatch SYNTAX 1.3.6.1.4.1.1466.115.121.1.15 )
    olcObjectClasses: ( 1.3.6.1.4.1.10176.1010.2.1 NAME 'univentionMail' DESC 'Univention Mail Preferences' SUP top AUXILIARY MUST uid MAY ( univentionMailHomeServer $ mailPrimaryAddress $ mailAlternativeAddress $ mailGlobalSpamFolder $ univentionMailUserQuota $ mailForwardAddress $ mailForwardCopyToSelf ) )

  07-ucsschool.ldif: |-
    # Extended schema for SchulCloudAdmin and UCS school types
    dn: cn=ucsschool,cn=schema,cn=config
    objectClass: olcSchemaConfig
    cn: ucsschool
    olcAttributeTypes: ( 1.3.6.1.4.1.10176.4200.1.1 NAME 'SchulCloudAdmin' DESC 'Flag indicating school cloud admin status' EQUALITY caseIgnoreMatch SYNTAX 1.3.6.1.4.1.1466.115.121.1.15 SINGLE-VALUE )
    olcObjectClasses: ( 1.3.6.1.4.1.10176.4200.2.1 NAME 'ucsschoolType' DESC 'UCS School Type' SUP top AUXILIARY MAY ( SchulCloudAdmin ) )
    olcObjectClasses: ( 1.3.6.1.4.1.10176.4200.2.2 NAME 'ucsschoolStudent' DESC 'UCS School Student' SUP top AUXILIARY )
    olcObjectClasses: ( 1.3.6.1.4.1.10176.4200.2.3 NAME 'ucsschoolStaff' DESC 'UCS School Staff' SUP top AUXILIARY )
    olcObjectClasses: ( 1.3.6.1.4.1.10176.4200.2.4 NAME 'ucsschoolTeacher' DESC 'UCS School Teacher' SUP top AUXILIARY )
    olcObjectClasses: ( 1.3.6.1.4.1.10176.4200.2.5 NAME 'ucsschoolAdministrator' DESC 'UCS School Administrator' SUP top AUXILIARY )


# Custom openldap configuration files used to override default settings
# can not get loaded if TLS is required ldap_bind: Confidentiality required (13) additional info: TLS confidentiality required
# DO NOT FORGET to put the Root Organisation object as it won't be created while using customLdifFiles
# Files that change the general config or create ACL are not allowed here, insufficient permissions, they get hendled via the erwin-portal-ldap-configuration secret
# Only considered once in the initial setup
customLdifFiles:
  00-root.ldif: |-
    dn: dc=training,dc=ucs
    objectClass: top
    objectClass: dcObject
    objectClass: organization
    dc: training
    o: Training UCS

  01-tree.ldif: |-
    dn: cn=users,dc=training,dc=ucs
    objectClass: top
    objectClass: organizationalRole
    cn: users

    dn: ou=100000,dc=training,dc=ucs
    objectClass: top
    objectClass: organizationalUnit
    ou: 100000

    dn: cn=users,ou=100000,dc=training,dc=ucs
    objectClass: top
    objectClass: organizationalRole
    cn: users

    dn: cn=mitarbeiter,cn=users,ou=100000,dc=training,dc=ucs
    objectClass: top
    objectClass: organizationalRole
    cn: mitarbeiter

    dn: cn=lehrer,cn=users,ou=100000,dc=training,dc=ucs
    objectClass: top
    objectClass: organizationalRole
    cn: lehrer

    dn: cn=schueler,cn=users,ou=100000,dc=training,dc=ucs
    objectClass: top
    objectClass: organizationalRole
    cn: schueler

    dn: ou=100001,dc=training,dc=ucs
    objectClass: top
    objectClass: organizationalUnit
    ou: 100001

    dn: cn=users,ou=100001,dc=training,dc=ucs
    objectClass: top
    objectClass: organizationalRole
    cn: users

    dn: cn=mitarbeiter,cn=users,ou=100001,dc=training,dc=ucs
    objectClass: top
    objectClass: organizationalRole
    cn: mitarbeiter

    dn: cn=lehrer,cn=users,ou=100001,dc=training,dc=ucs
    objectClass: top
    objectClass: organizationalRole
    cn: lehrer

    dn: cn=schueler,cn=users,ou=100001,dc=training,dc=ucs
    objectClass: top
    objectClass: organizationalRole
    cn: schueler

    dn: ou=100002,dc=training,dc=ucs
    objectClass: top
    objectClass: organizationalUnit
    ou: 100002

    dn: cn=users,ou=100002,dc=training,dc=ucs
    objectClass: top
    objectClass: organizationalRole
    cn: users

    dn: cn=mitarbeiter,cn=users,ou=100002,dc=training,dc=ucs
    objectClass: top
    objectClass: organizationalRole
    cn: mitarbeiter

    dn: cn=lehrer,cn=users,ou=100002,dc=training,dc=ucs
    objectClass: top
    objectClass: organizationalRole
    cn: lehrer

    dn: cn=schueler,cn=users,ou=100002,dc=training,dc=ucs
    objectClass: top
    objectClass: organizationalRole
    cn: schueler

    # Add missing organizational units for 100481
    dn: ou=100481,dc=training,dc=ucs
    objectClass: top
    objectClass: organizationalUnit
    ou: 100481

    dn: cn=users,ou=100481,dc=training,dc=ucs
    objectClass: top
    objectClass: organizationalRole
    cn: users

    dn: cn=mitarbeiter,cn=users,ou=100481,dc=training,dc=ucs
    objectClass: top
    objectClass: organizationalRole
    cn: mitarbeiter

    dn: cn=lehrer,cn=users,ou=100481,dc=training,dc=ucs
