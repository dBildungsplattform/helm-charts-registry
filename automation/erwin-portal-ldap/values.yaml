# Extra LDIF files applied after initial setup (currently empty - seed data comes from 1Password)
customExtraLdifFiles:
  apply.ldif: |-
    # Placeholder - actual user data loaded from seedData secret

  modify.ldif: |-
    # Placeholder - modifications if needed

replicaCount: 1

# LDAP Seed Data Configuration
# Secret containing LDIF data to populate LDAP (created from 1Password)
# The secret should have a key containing the LDIF content
seedData:
  enabled: true
  # Name of the secret containing LDIF data (created from 1Password)
  secretName: erwin-ldap-seed-data
  # Name of the LDIF file in the secret
  ldifFileName: univention_users_0_9MB.ldif

# will have to work on this
replication:
  enabled: false
  clusterName: "cluster.local"
  retry: 60
  timeout: 1
  interval: 00:00:00:10
  starttls: "critical"
  tls_reqcert: "never"

persistence:
  enabled: false
  # existingClaim: openldap-pvc
  accessModes:
    - ReadWriteOnce
  size: 8Gi
  storageClass: ""

resources:
  limits:
    cpu: 2
    memory: 4G
  requests:
    cpu: 100m
    memory: 100Mi

# enabling other features makes it so that ldap container fails with not enough permissions
containerSecurityContext:
  enabled: true
  runAsUser: 1001
  runAsNonRoot: true
  privileged: false
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: false
  # capabilities:
  #   drop: ["ALL"]
  # seccompProfile:
  #   type: "RuntimeDefault"

podSecurityContext:
  enabled: true
  runAsUser: 1001
  runAsNonRoot: true
  privileged: false
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: "RuntimeDefault"

existingConfigmap:
command: []
args: []
hostAliases: []
podLabels: {}
podAnnotations: {}
podAffinityPreset: ""
podAntiAffinityPreset: soft
nodeAffinityPreset:
  type: ""
  key: ""
  values: []
affinity: {}
nodeSelector: {}
tolerations: []
updateStrategy:
  type: RollingUpdate

priorityClassName: ""
schedulerName: ""

extraEnvVars: []
extraEnvVarsCM:
extraEnvVarsSecret:
extraVolumes: []
extraVolumeMounts: []

serviceAccount:
  create: false
  name: ""
  automountServiceAccountToken: false
  annotations: {}  

kubeVersion: ""
commonLabels: {}
commonAnnotations: {}
clusterDomain: cluster.local
extraDeploy: []

metrics:
  enabled: true
  replicaCount: 1
  image:
    # we should create an own forked repo and publish the image 
    repository: ollijanatuinen/openldap-exporter
    tag: v2.0
    pullPolicy: IfNotPresent
  ports:
    - name: metrics
      containerPort: 9330
  resources:
    limits:
      cpu: 300m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 64Mi

  service:
    type: ClusterIP
    annotations: {}
    labels: {}
    ports:
      - name: metrics
        port: 9330

  ## Prometheus Operator ServiceMonitor configuration
  serviceMonitor:
    enabled: true
    endpoints:
      - port: "metrics"
        path: /metrics

## Init Container Parameters
initSchema:
  image: 
    repository: debian
    tag: latest
    pullPolicy: IfNotPresent
    pullSecrets: []

## initContainers:
##  - name: your-image-name
##    image: your-image
##    imagePullPolicy: Always
##    command: ['sh', '-c', 'echo "hello world"']
##

## 'initTlsSecret' init container parameters
##  need a secret with tls.crt, tls.key 
initTLSSecret:
  # adminldap, per default disabled only works with tls_enabled
  tls_enabled: false
  # tls_enabled: true # needs to get enabled if you want to make the service available to the outside 
  # Note that only one namespace at a time can use this feature and that you need to copy a tls secret into the namespace, see Confluence for more information
  image:
    registry: docker.io
    repository: alpine/openssl
    tag: latest
    pullPolicy: IfNotPresent
  secret: "" 
  resources:
    limits:
      cpu: 500m
      memory: 500Mi
    requests:
      cpu: 100m
      memory: 100Mi

volumePermissions:
  enabled: true
  image:
    repository: debian
    tag: latest
    pullPolicy: IfNotPresent
    command: [ 'sh', '-c', 'chmod -R g+rwX /bitnami' ]
  resources:
    limits:
      cpu: 200m
      memory: 200Mi
    requests:
      cpu: 100m
      memory: 100Mi

sidecars: {}

lifecycleHooks: 
  postStart:
    exec:
      command: ["sh", "-c", "/script/01.sh"]

livenessProbe:
  enabled: true
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 1
  successThreshold: 1
  failureThreshold: 10
readinessProbe:
  enabled: true
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 1
  successThreshold: 1
  failureThreshold: 10
startupProbe:
  enabled: true
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 1
  successThreshold: 1
  failureThreshold: 30
customLivenessProbe: {}
customReadinessProbe: {}
customStartupProbe: {}

