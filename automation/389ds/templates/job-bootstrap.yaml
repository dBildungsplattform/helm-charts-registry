{{- /*
This job is executed by a Helm hook post install hook by default to ensure it is only run once. 
However, there are also other possibilities (also to not depend on Helm as lifecycle management) that should
  be evaluated at a later stage (TODO).
*/}}
{{- if .Values.extendedBootstrap.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "389ds.fullname" . }}-bootstrap
  labels:
    {{- include "389ds.labels" . | nindent 4 }}
  {{- with .Values.extendedBootstrap.annotations }}
  annotations:
    {{- toYaml . | nindent 8 }}
  {{- end }}
spec:
  template:
    spec:
      containers:
      - name: dirsrv-bootstrap
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          readOnlyRootFilesystem: true
        volumeMounts:
        {{- include "389ds.bootstrapVolumeMount" . | nindent 8 }}
        command: ["/scripts/bootstrap.sh"]
        env:
        - name: DS_DM_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.dsDmPassword.secretName | quote }}
              key: {{ .Values.dsDmPassword.secretKey | quote }}
        - name: DS_SUFFIX_NAME
          value: {{ .Values.dsSuffixName | quote }}
        {{- include "389ds.bootstrapEnv" . | nindent 8 }}
      volumes:
        {{- include "389ds.bootstrapVolume" . | nindent 8 }}
      restartPolicy: OnFailure
  backoffLimit: 4
{{ end }}
