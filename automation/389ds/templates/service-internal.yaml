apiVersion: v1
kind: Service
metadata:
  name: {{ include "389ds.fullname" . }}-internal
  labels:
    {{- include "389ds.labels" . | nindent 4 }}
spec:
  type: "ClusterIP"
  ports:
    - name: dirsrv-insecure
      port: {{ .Values.service.insecurePort }}
      protocol: TCP
      targetPort: 3389
    - name: dirsrv-secure
      port: {{ .Values.service.securePort }}
      protocol: TCP
      targetPort: 3636
  selector:
    {{- include "389ds.selectorLabels" . | nindent 4 }}
