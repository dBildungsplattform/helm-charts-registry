# Default values for 389ds.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This is to override the chart name.
nameOverride: ""
fullnameOverride: "port389ds"

replicaCount: 1

dsSuffixName: "dc=example,dc=com"

dsDmPassword:
  secretName: ""
  secretKey: ""

persistence:
  enabled: true
  size: 10Gi

# -- this only has an effect if configured before helm install, otherwise cp /etc/dirsrv/schema/99user.ldif /data/config/schema/99user.ldif is needed
customSchema: ""

service:
  securePort: 3636
  insecurePort: 3389

tls:
  existingSecret: ""
  certKey: "tls.crt"
  keyKey: "tls.key"

# Runs once on helm install and does extended bootstrap (disable anonymous bind, create additional backends, set up replication)
extendedBootstrap:
  helmHook: "post-install"
  # If you want to use extended bootstrap, define the peers below according to the number of replicas and their service names
  # Note that downsizing the replica count or disabling HA after enabling HA replication is not supported! Always check if the cluster is healthy and the config fits when downsizing!
  enabled: false
  peers: "port389ds-0.port389ds-headless"
  #peers: "port389ds-0.port389ds-headless port389ds-1.port389ds-headless port389ds-2.port389ds-headless" # Example for replicaCount: 3: + fullnameOverride: "port389ds"
  backendName: "userroot"
  rmPassword:
    secretName: ""
    secretKey: ""
  # -- Ldif to import on bootstrap. Note that Directory Server first removes all existing data from the database and, subsequently, imports the data from the LDIF file
  importLdif: ""

image:
  repository: registry.suse.com/suse/389-ds
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []

resources:
  limits:
    memory: "256Mi"
    cpu: "250m"
  requests:
    memory: "256Mi"
    cpu: "100m"

livenessProbe:
  exec:
    command:
    - /usr/lib/dirsrv/dscontainer
    - -H
  timeoutSeconds: 5

readinessProbe:
  exec:
    command:
    - /usr/lib/dirsrv/dscontainer
    - -H
  timeoutSeconds: 5

startupProbe:
  exec:
    command:
    - /usr/lib/dirsrv/dscontainer
    - -H
  initialDelaySeconds: 30
  timeoutSeconds: 5

metrics:
  enabled: false
  image:
    repository: telegraf
    tag: "1.37.1"
    pullPolicy: IfNotPresent
  bind:
    secretName: ""
    secretKey: ""
    dn: ""
  resources:
    limits:
      memory: "128Mi"
      cpu: "100m"
    requests:
      memory: "64Mi"
      cpu: "50m"

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}

podLabels: {}

podSecurityContext: {}

nodeSelector: {}

tolerations: []

affinity: {}

extraObjects: []
